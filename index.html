<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ski Bag Survey</title>
<style>
body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
h1 { text-align: center; }
.question { margin-bottom: 25px; }
.options label { display: block; margin: 5px 0; }
button { padding: 12px 20px; font-size: 16px; }
.lang-switch { text-align: right; margin-bottom: 20px; }
</style>
</head>

<body>

<div class="lang-switch">
<select id="lang">
<option value="zh">中文</option>
<option value="en">English</option>
</select>
</div>

<h1 id="title"></h1>

<form action="https://formspree.io/f/xaqlnjyw" method="POST">

<div class="question">
<p id="q1"></p>
<div class="options">
<label><input type="radio" name="q1"> <span data-zh="雪季几乎每天" data-en="Almost every day"></span></label>
<label><input type="radio" name="q1"> <span data-zh="10–30天" data-en="10–30 days"></span></label>
<label><input type="radio" name="q1"> <span data-zh="10天以内" data-en="Less than 10 days"></span></label>
<label><input type="radio" name="q1"> <span data-zh="1次或不滑" data-en="Once or not at all"></span></label>
</div>
</div>

<div class="question">
<p id="q2"></p>
<div class="options">
<label><input type="radio" name="q2"> <span data-zh="自带雪具" data-en="Bring my own gear"></span></label>
<label><input type="radio" name="q2"> <span data-zh="寄存雪场" data-en="Store at resort"></span></label>
<label><input type="radio" name="q2"> <span data-zh="租赁雪具" data-en="Rent gear"></span></label>
</div>
</div>

<div class="question">
<p id="q11"></p>
<div class="options" id="multi">
<label><input type="checkbox" name="q11"> <span data-zh="电动助力" data-en="Power assist"></span></label>
<label><input type="checkbox" name="q11"> <span data-zh="自动跟随" data-en="Auto-follow"></span></label>
<label><input type="checkbox" name="q11"> <span data-zh="都可以" data-en="Both"></span></label>
<label><input type="checkbox" name="q11"> <span data-zh="都不需要" data-en="None"></span></label>
</div>
</div>

<div class="question">
<p id="q_price"></p>
<div class="options">
<label><input type="radio" name="price_limit"> $300</label>
<label><input type="radio" name="price_limit"> $500</label>
<label><input type="radio" name="price_limit"> $700</label>
</div>
</div>

<div class="question">
<p id="q_test"></p>
<div class="options">
<label><input type="radio" name="test"> <span data-zh="愿意" data-en="Yes"></span></label>
<label><input type="radio" name="test"> <span data-zh="不愿意" data-en="No"></span></label>
</div>
</div>

<button type="submit" id="submitBtn"></button>

</form>

<script>
const texts = {
zh: {
title: "雪板包运输调研",
q1: "1. 你的滑雪频率是？",
q2: "2. 你通常如何使用雪具？",
q11: "3. 你更偏好哪些功能？（最多选2个）",
q_price: "4. 该产品价格超过多少你可能不考虑购买？",
q_test: "5. 你是否愿意参与测试？",
submit: "提交"
},
en: {
title: "Ski Bag Transport Survey",
q1: "1. How often do you ski?",
q2: "2. How do you usually use ski gear?",
q11: "3. Which features do you prefer? (Select up to 2)",
q_price: "4. At what price would you likely NOT consider buying?",
q_test: "5. Would you join product testing?",
submit: "Submit"
}
};

function switchLang(lang){
document.getElementById("title").innerText = texts[lang].title;
document.getElementById("q1").innerText = texts[lang].q1;
document.getElementById("q2").innerText = texts[lang].q2;
document.getElementById("q11").innerText = texts[lang].q11;
document.getElementById("q_price").innerText = texts[lang].q_price;
document.getElementById("q_test").innerText = texts[lang].q_test;
document.getElementById("submitBtn").innerText = texts[lang].submit;

document.querySelectorAll("span[data-zh]").forEach(el=>{
el.innerText = el.getAttribute("data-"+lang);
});
}

document.getElementById("lang").addEventListener("change", e=>{
switchLang(e.target.value);
});

switchLang("zh");

// 限制最多选2个
document.querySelectorAll('#multi input').forEach(box=>{
box.addEventListener('change',()=>{
let checked = document.querySelectorAll('#multi input:checked');
if(checked.length > 2){
box.checked = false;
alert("最多选择2项 / Max 2 options");
}
});
});
</script>

</body>
</html>
